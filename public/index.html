<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Header */
        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #888;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
        }
        
        .header-agents {
            display: flex;
            margin-left: auto;
            gap: 8px;
        }
        
        .agent-pill {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .pill-bang { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .pill-handal { background: rgba(78, 205, 196, 0.2); color: #4ecdc4; }
        .pill-cermat { background: rgba(255, 230, 109, 0.2); color: #ffe66d; }
        .pill-gesit { background: rgba(149, 225, 211, 0.2); color: #95e1d3; }
        .pill-astutik { background: rgba(243, 129, 129, 0.2); color: #f38181; }
        .pill-pedas { background: rgba(170, 150, 218, 0.2); color: #aa96da; }
        .pill-dany { background: rgba(100, 200, 255, 0.2); color: #64c8ff; }
        
        /* Messages Container */
        .messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            background: #0f0f0f;
        }
        
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        
        /* Message */
        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .message-author {
            font-size: 13px;
            font-weight: 600;
        }
        
        .message-time {
            font-size: 11px;
            color: #666;
        }
        
        .message-body {
            background: #1a1a1a;
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 3px solid;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .msg-bang .message-body { border-left-color: #ff6b6b; }
        .msg-handal .message-body { border-left-color: #4ecdc4; }
        .msg-cermat .message-body { border-left-color: #ffe66d; }
        .msg-gesit .message-body { border-left-color: #95e1d3; }
        .msg-astutik .message-body { border-left-color: #f38181; }
        .msg-pedas .message-body { border-left-color: #aa96da; }
        .msg-dany .message-body { border-left-color: #64c8ff; }
        
        .author-bang { color: #ff6b6b; }
        .author-handal { color: #4ecdc4; }
        .author-cermat { color: #ffe66d; }
        .author-gesit { color: #95e1d3; }
        .author-astutik { color: #f38181; }
        .author-pedas { color: #aa96da; }
        .author-dany { color: #64c8ff; }
        
        /* Empty state */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* Input Area */
        .input-area {
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding: 16px 20px;
            flex-shrink: 0;
        }
        
        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .input-row select {
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f0f;
            color: #fff;
            font-size: 14px;
            min-width: 140px;
        }
        
        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f0f;
            color: #fff;
            font-size: 14px;
        }
        
        .input-row input:focus {
            outline: none;
            border-color: #4ecdc4;
        }
        
        .input-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #4caf50;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .input-row button:hover {
            background: #45a049;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .controls button {
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f0f0f;
            color: #888;
            font-size: 12px;
            cursor: pointer;
        }
        
        .controls button:hover {
            background: #222;
            color: #fff;
        }
        
        .mode-label {
            color: #666;
            font-size: 12px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <span class="header-title">💬 Multi-Agent Chat</span>
            <span class="header-status">
                <span class="status-dot"></span>
                <span id="statusText">Connected</span>
            </span>
            <div class="header-agents">
                <span class="agent-pill pill-dany">Dany</span>
                <span class="agent-pill pill-bang">Bang</span>
                <span class="agent-pill pill-handal">Handal</span>
                <span class="agent-pill pill-cermat">Cermat</span>
                <span class="agent-pill pill-gesit">Gesit</span>
                <span class="agent-pill pill-astutik">Astutik</span>
                <span class="agent-pill pill-pedas">Pedas</span>
            </div>
        </header>
        
        <div class="messages" id="messages">
            <div class="empty">
                <div class="empty-icon">👋</div>
                <p>Hi Dany! Start chatting with the agents.</p>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-row">
                <select id="agentSelect">
                    <option value="dany" selected>👤 Dany (You)</option>
                    <option value="bang">🎯 Bang</option>
                    <option value="handal">🔍 Handal</option>
                    <option value="cermat">💰 Cermat</option>
                    <option value="gesit">🚀 Gesit</option>
                    <option value="astutik">⚡ Astutik</option>
                    <option value="pedas">🔥 Pedas</option>
                </select>
                <input type="text" id="messageInput" placeholder="Type a message to the agents...">
                <button onclick="send()">Send</button>
            </div>
            <div class="controls">
                <button onclick="clearChat()">🗑 Clear Chat</button>
                <span class="mode-label">Default: Chat as Dany</span>
            </div>
        </div>
    </div>

    <script>
        const messages = document.getElementById('messages');
        const agentSelect = document.getElementById('agentSelect');
        const messageInput = document.getElementById('messageInput');
        
        // Track rendered messages to avoid re-rendering
        let renderedMessages = new Set();
        let messageIdCounter = 0;
        
        const authorColors = {
            dany: 'author-dany',
            bang: 'author-bang',
            handal: 'author-handal', 
            cermat: 'author-cermat',
            gesit: 'author-gesit',
            astutik: 'author-astutik',
            pedas: 'author-pedas'
        };
        
        // Initial load
        loadInitial();
        
        // Poll for new messages every 3 seconds
        setInterval(pollNewMessages, 3000);
        
        async function loadInitial() {
            try {
                const res = await fetch('/api/chat/log?limit=100');
                const data = await res.json();
                
                // Clear and render all
                messages.innerHTML = '';
                renderedMessages.clear();
                
                if (!data.messages || data.messages.length === 0) {
                    showEmpty();
                    return;
                }
                
                data.messages.forEach(line => {
                    appendMessage(line);
                });
                
                scrollToBottom();
                document.getElementById('statusText').textContent = 'Connected';
            } catch (err) {
                document.getElementById('statusText').textContent = 'Disconnected';
            }
        }
        
        async function pollNewMessages() {
            try {
                const res = await fetch('/api/chat/log?limit=100');
                const data = await res.json();
                
                if (!data.messages) return;
                
                // Find new messages
                const currentIds = new Set(data.messages);
                const newMessages = data.messages.filter(line => !renderedMessages.has(line));
                
                // Add new messages
                newMessages.forEach(line => {
                    appendMessage(line);
                });
                
                // Auto-scroll if near bottom
                const nearBottom = messages.scrollHeight - messages.scrollTop - messages.clientHeight < 100;
                if (nearBottom && newMessages.length > 0) {
                    scrollToBottom();
                }
                
                document.getElementById('statusText').textContent = 'Connected';
            } catch (err) {
                document.getElementById('statusText').textContent = 'Disconnected';
            }
        }
        
        function appendMessage(line) {
            if (renderedMessages.has(line)) return;
            
            // Remove empty state if exists
            if (messages.querySelector('.empty')) {
                messages.innerHTML = '';
            }
            
            renderedMessages.add(line);
            
            const match = line.match(/\[(.*?)\]\s*\[(.*?)\]\s*(.+)/);
            if (!match) {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `<div class="message-body">${esc(line)}</div>`;
                messages.appendChild(div);
                return;
            }
            
            const [, time, agent, text] = match;
            const agentLower = agent.toLowerCase();
            const authorClass = authorColors[agentLower] || '';
            
            const div = document.createElement('div');
            div.className = `message msg-${agentLower}`;
            div.innerHTML = `
                <div class="message-header">
                    <span class="message-author ${authorClass}">${agent}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-body">${esc(text)}</div>
            `;
            
            messages.appendChild(div);
        }
        
        function showEmpty() {
            messages.innerHTML = `
                <div class="empty">
                    <div class="empty-icon">👋</div>
                    <p>Hi Dany! Start chatting with the agents.</p>
                </div>`;
        }
        
        async function send() {
            const agent = agentSelect.value;
            const text = messageInput.value.trim();
            if (!text) return;
            
            // Visual feedback - add message immediately
            const now = new Date().toISOString().slice(0, 16).replace('T', ' ');
            const line = `[${now}] [${agent.toUpperCase()}] ${text}`;
            appendMessage(line);
            scrollToBottom();
            
            messageInput.value = '';
            
            try {
                await fetch('/api/chat/post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent, message: text })
                });
            } catch (err) {
                console.error('Failed to send:', err);
            }
        }
        
        async function clearChat() {
            if (!confirm('Clear all messages?')) return;
            
            try {
                await fetch('/api/chat/clear', { method: 'DELETE' });
                
                // Clear UI immediately
                messages.innerHTML = '';
                renderedMessages.clear();
                
                showEmpty();
            } catch (err) {
                console.error('Failed to clear:', err);
            }
        }
        
        function scrollToBottom() {
            messages.scrollTop = messages.scrollHeight;
        }
        
        function esc(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        messageInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') send();
        });
        
        // Auto-focus input
        messageInput.focus();
    </script>
</body>
</html>
